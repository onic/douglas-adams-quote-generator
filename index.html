<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Douglas Adams Quote Generator</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <h1>Douglas Adams Quote Generator</h1>
      <button id="new-quote-button" type="button">Show quote</button>
      <div class="quote-card">
        <p id="quote-output" role="status" aria-live="polite">Click the button to display a quote.</p>
        <cite id="quote-source"></cite>
        <button id="copy-button" type="button" aria-label="Copy quote to clipboard" style="display: none;">Copy</button>
      </div>
    </main>
    <script type="module" src="./script.js"></script>
  </body>
</html>
